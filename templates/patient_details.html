<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration – DenTech AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'>🦷</svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

  <nav class="site-nav scrolled" id="siteNav">
    <div class="nav-inner">
      <a href="{{ url_for('index') }}" class="nav-brand">
        <div class="nav-brand-icon">🦷</div>
        <span class="nav-brand-text">DenTech <span>AI</span></span>
      </a>
      <div class="nav-links">
        <a href="{{ url_for('index') }}"           class="nav-link">Home</a>
        <a href="{{ url_for('patient_details') }}" class="nav-link active">Analysis</a>
        <a href="{{ url_for('patient_history') }}" class="nav-link">History</a>
      </div>
    </div>
  </nav>

  <div class="form-page">
    <div class="container">

      <!-- Header -->
      <div class="form-header-block anim-fade-up anim-delay-1">
        <span class="section-eyebrow"><i class="fas fa-user-plus"></i> &nbsp;Step 1 of 3</span>
        <h1 class="section-title" style="font-size:2.2rem;">Patient Registration</h1>
        <p class="section-sub" style="font-size:.95rem;">Quick &amp; secure patient information entry</p>
        <!-- Steps -->
        <div class="steps" style="justify-content:center;margin-top:1.5rem;">
          <div class="step-item active">
            <div class="step-dot">1</div>
            <span style="display:none;">Details</span>
          </div>
          <div class="step-connector"></div>
          <div class="step-item">
            <div class="step-dot">2</div>
          </div>
          <div class="step-connector"></div>
          <div class="step-item">
            <div class="step-dot">3</div>
          </div>
        </div>
        <div style="display:flex;justify-content:center;gap:3.5rem;margin-top:.5rem;font-size:.75rem;color:var(--text-muted);">
          <span style="color:var(--accent);font-weight:600;">Details</span>
          <span>Upload</span>
          <span>Results</span>
        </div>
      </div>

      <!-- Form Card -->
      <div class="form-card anim-fade-up anim-delay-2">
        <form id="patientForm" autocomplete="off">

          <!-- Patient ID -->
          <div class="form-group" style="margin-bottom:1.25rem;">
            <label class="form-label">
              Patient ID <span class="auto-label">Auto</span>
            </label>
            <div class="input-btn-row">
              <input type="text" class="form-input" id="patient_id" name="patient_id" readonly placeholder="Generating…">
              <button type="button" id="generateIdBtn" class="btn btn-outline btn-sm">
                <i class="fas fa-sync-alt"></i> Refresh
              </button>
            </div>
          </div>

          <!-- Name + Age -->
          <div class="form-grid-2" style="margin-bottom:1.25rem;">
            <div class="form-group">
              <label class="form-label">Full Name <span class="required-star">*</span></label>
              <input type="text" class="form-input" id="name" name="name" required placeholder="Enter patient name">
            </div>
            <div class="form-group">
              <label class="form-label">Age <span class="required-star">*</span></label>
              <input type="number" class="form-input" id="age" name="age" required min="1" max="120" placeholder="Years">
            </div>
          </div>

          <!-- Gender + Visit Date -->
          <div class="form-grid-2" style="margin-bottom:1.25rem;">
            <div class="form-group">
              <label class="form-label">Gender <span class="required-star">*</span></label>
              <select class="form-input form-select" id="gender" name="gender" required>
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
                <option value="Prefer not to say">Prefer not to say</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Visit Date <span class="required-star">*</span></label>
              <input type="date" class="form-input" id="visit_date" name="visit_date" required>
            </div>
          </div>

          <!-- Notes -->
          <div class="form-group" style="margin-bottom:1.25rem;">
            <label class="form-label">Additional Notes <span style="color:var(--text-muted);font-weight:400;">(Optional)</span></label>
            <textarea class="form-input form-textarea" id="notes" name="notes" rows="3" placeholder="Any additional information…"></textarea>
          </div>

          <!-- Actions -->
          <div class="form-actions">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">
              <i class="fas fa-arrow-left"></i> Back
            </a>
            <button type="submit" class="btn btn-primary" id="submitBtn">
              Continue <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </form>

        <p class="privacy-note">
          <i class="fas fa-lock" style="color:var(--accent);"></i>
          Your data is encrypted and stored securely
        </p>
      </div>

    </div>
  </div>

  <script>
    // Set today's date
    document.getElementById('visit_date').value = new Date().toISOString().split('T')[0];

    // Generate patient ID
    async function generateId() {
      try {
        const r = await fetch('/api/generate-patient-id');
        const d = await r.json();
        document.getElementById('patient_id').value = d.patient_id;
      } catch {
        const ts = new Date().toISOString().replace(/[-:T]/g,'').substring(0,14);
        document.getElementById('patient_id').value = 'DT' + ts + Math.floor(Math.random()*9000+1000);
      }
    }
    generateId();

    document.getElementById('generateIdBtn').addEventListener('click', async function() {
      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      await generateId();
      this.disabled = false;
      this.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh';
    });

    // Form submit
    document.getElementById('patientForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!this.checkValidity()) { this.reportValidity(); return; }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing…';
      setTimeout(() => {
        const params = new URLSearchParams(new FormData(this));
        window.location.href = '/upload?' + params.toString();
      }, 800);
    });

    // Real-time validation feedback
    ['name','age','gender','visit_date'].forEach(name => {
      const el = document.getElementById(name);
      el.addEventListener('blur', () => {
        el.style.borderColor = el.checkValidity() && el.value.trim()
          ? 'var(--success)' : '';
      });
    });
  </script>
</body>
</html>
